<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" type= "text/css" href="style.css"> 
</head>
<body>

    <div class="container">
        <input type="text" id="useinp" placeholder="0" disabled>
        <input type="text" id="compout" placeholder="0" disabled>

        <table>
            <tr>
                <td onclick="trace('(')">(</td>
                <td onclick="trace(')')">)</td>
                <td onclick="removech()">&lt;-</td>
                <td onclick="trace('+')" class="vari">+</td>
            </tr>

            <tr>
                <td onclick="trace('7')">7</td>
                <td onclick="trace('8')">8</td>
                <td onclick="trace('9')">9</td>
                <td onclick="trace('-')" class="vari">-</td>
            </tr>

            <tr>
                <td onclick="trace('4')">4</td>
                <td onclick="trace('5')">5</td>
                <td onclick="trace('6')">6</td>
                <td onclick="trace('*')" class="vari">*</td>
            </tr>

            <tr>
                <td onclick="trace('1')">1</td>
                <td onclick="trace('2')">2</td>
                <td onclick="trace('3')">3</td>
                <td onclick="trace('/')" class="vari">/</td>
            </tr>

            <tr>
                <td onclick="reset()"><b>C</b></td>
                <td onclick="trace('0')">0</td>
                <td onclick="trace('.')">.</td>
                <td class="equalbtn" onclick="execm()">=</td>
            </tr>
        </table>

    </div>
    <script src="./script.js"></script>
    
</body>
</html>
